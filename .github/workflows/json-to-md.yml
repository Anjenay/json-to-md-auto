name: Auto Convert JSON to Markdown

on:
  push:
    paths:
      - '**.txt'
      - '**.json'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Run conversion
        run: python convert.py

      - name: Commit changes
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git commit -m "Auto convert JSON to Markdown" || echo "No changes"
          git push